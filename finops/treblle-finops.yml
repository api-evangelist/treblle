specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Treblle
providerId: treblle
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - API Observability
  - API Intelligence
  - Developer Tools
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps for Treblle: tiered subscription with hard monthly request caps
  on the self-serve Core plan and contract-negotiated request, retention, and workspace ceilings on
  Growth and Enterprise.'
sources:
  - https://www.treblle.com/pricing
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Treblle Limited
serviceCategory: Developer Tools / API Observability
billingModel:
  pricingCategory: Tiered Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
focusColumns:
  ServiceName: Treblle
  ServiceCategory: Developer Tools / API Observability
  ProviderName: Treblle
  PublisherName: Treblle Limited
  InvoiceIssuerName: Treblle Limited
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: subscription_month
    unit: month
    aggregation: sum
    dimensions:
      - plan
  - name: api_requests
    unit: request
    aggregation: sum
    dimensions:
      - workspace
      - api
  - name: tracked_apis
    unit: api
    aggregation: max
    dimensions:
      - workspace
  - name: workspaces
    unit: workspace
    aggregation: max
    dimensions:
      - account
  - name: data_retention_days
    unit: day
    aggregation: max
    dimensions:
      - workspace
principles:
  - name: Visibility
    description: Workspace usage (APIs tracked, monthly request counts, retention) is exposed in the
      Treblle dashboard against the contracted plan caps; finance teams reconcile against the annual
      Core invoice or the negotiated Growth/Enterprise contract.
  - name: Allocation
    description: Allocate cost using Treblle workspaces and the per-API tag set already collected by
      Treblle's API Intelligence; one workspace per Core plan, multiple on Enterprise.
  - name: Optimization
    description: On Core, optimize by consolidating low-volume APIs into the 10-API / 50M-request cap
      before triggering an upgrade; on Growth and Enterprise, right-size the contracted requests-per-minute
      and retention window to the SLO actually required by API Security and Governance use cases.
  - name: Accountability
    description: API platform / DevEx team owns the Treblle subscription; per-API owners are responsible
      for keeping ingested request volume inside the workspace cap.
maintainers:
