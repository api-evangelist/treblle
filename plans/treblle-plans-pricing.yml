specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Treblle
providerId: treblle
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - API Observability
  - API Intelligence
  - Developer Tools
  - API Security
description: Treblle prices API observability and intelligence as a tiered subscription. The self-serve
  Core plan is published with a flat annual price and concrete usage caps; Growth and Enterprise are
  custom-quoted with expanded APIs, retention, and request volumes plus added security/governance
  modules.
sources:
  - https://www.treblle.com/pricing
plans:
  - id: treblle-core
    name: Core
    type: subscription
    description: Self-serve plan for small professional API teams. Includes API Intelligence,
      Documentation, Analytics, Testing, and Observability with a fixed monthly cost when billed yearly.
    entries:
      - label: Monthly Subscription
        name: subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$233 / mo (billed yearly)'
        userMultiplied: false
      - label: APIs Tracked
        name: apis_tracked
        type: quota
        metric: api
        limit: 10
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: API Requests
        name: api_requests
        type: quota
        metric: request
        limit: 50000000
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Data Retention
        name: data_retention
        type: quota
        metric: day
        limit: 30
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Workspaces
        name: workspaces
        type: quota
        metric: workspace
        limit: 1
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Team Members
        name: team_members
        type: quota
        metric: seat
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: API Intelligence
      - name: API Documentation
      - name: API Analytics
      - name: API Testing
      - name: API Observability
  - id: treblle-growth
    name: Growth
    type: enterprise
    description: Custom-quoted plan for teams maintaining business-critical APIs. Adds API Security
      and Agentic AI, with custom request-per-minute and retention values.
    entries:
      - label: Subscription
        name: subscription
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: custom
        userMultiplied: false
      - label: APIs Tracked
        name: apis_tracked
        type: quota
        metric: api
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: custom
        userMultiplied: false
      - label: Requests Per Minute
        name: requests_per_minute
        type: quota
        metric: requests_per_minute
        limit: -1
        timeFrame: minute
        geo: global
        unit: 1
        price: custom
        userMultiplied: false
    elements:
      - name: Everything in Core
      - name: API Security
      - name: Agentic AI
      - name: Custom Data Retention
  - id: treblle-enterprise
    name: Enterprise
    type: enterprise
    description: Custom-quoted plan for organizations scaling API operations with enterprise support,
      SSO, on-premises / BYO Cloud deployment, and a 99.9% SLA.
    entries:
      - label: Subscription
        name: subscription
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: custom
        userMultiplied: false
      - label: Workspaces
        name: workspaces
        type: quota
        metric: workspace
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: custom
        userMultiplied: false
      - label: API Requests
        name: api_requests
        type: quota
        metric: request
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: custom
        userMultiplied: false
      - label: Requests Per Minute
        name: requests_per_minute
        type: quota
        metric: requests_per_minute
        limit: -1
        timeFrame: minute
        geo: global
        unit: 1
        price: custom
        userMultiplied: false
    elements:
      - name: Everything in Growth
      - name: API Governance
      - name: API Compliance
      - name: API Catalog
      - name: API Discovery
      - name: SSO
      - name: On-Premises / BYO Cloud
      - name: 99.9% SLA
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
