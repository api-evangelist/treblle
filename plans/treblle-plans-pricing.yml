description: Machine-readable plans and pricing scaffold for this API provider. Conforms to the API Commons
  Plans schema. Tier limits and prices are scaffold defaults; replace with provider-published values.
plans:
  - id: treblle-free
    name: Free
    type: freemium
    description: Free entry tier for the Treblle API surface. Intended for evaluation, prototyping, and
      low-volume integrations. Real limits and pricing must be reconciled with the provider's published
      plan documentation.
    entries:
      - label: API Requests
        description: Monthly API request quota across all included endpoints
        name: api_requests
        type: quota
        metric: requests
        limit: 1000
        timeFrame: month
        geo: global
        domains:
          - https://app.treblle.com/api/v1
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Rate Limit
        description: Maximum requests per minute on the free tier
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 10
        timeFrame: minute
        geo: global
        domains:
          - https://app.treblle.com/api/v1
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Public Documentation
      - name: Community Support
      - name: Sandbox Access
      - name: Treblle
      - name: Treblle Platform API
      - name: Treblle API Intelligence
      - name: Treblle API Documentation
      - name: Treblle API Governance
      - name: Treblle API Analytics
      - name: Treblle API Security
      - name: Treblle API Insights
  - id: treblle-pro
    name: Professional
    type: paid
    description: Production tier for Treblle. Provides higher quotas, priority support, and access to
      the broader API portfolio. Pricing placeholder; align with the provider's pricing page.
    entries:
      - label: API Requests
        description: Monthly API request quota
        name: api_requests
        type: quota
        metric: requests
        limit: 100000
        timeFrame: month
        geo: global
        domains:
          - https://app.treblle.com/api/v1
        unit: 1
        price: TBD
        userMultiplied: false
      - label: Rate Limit
        description: Maximum requests per minute on the professional tier
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 100
        timeFrame: minute
        geo: global
        domains:
          - https://app.treblle.com/api/v1
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Overage
        description: Per-request price after monthly quota is exceeded
        name: overage
        type: metered
        metric: requests
        limit: -1
        timeFrame: month
        geo: global
        domains:
          - https://app.treblle.com/api/v1
        unit: 1000
        price: TBD
        userMultiplied: false
    elements:
      - name: All Production Endpoints
      - name: Email Support
      - name: SLA Targets
      - name: Webhook Subscriptions
      - name: Treblle
      - name: Treblle Platform API
      - name: Treblle API Intelligence
      - name: Treblle API Documentation
      - name: Treblle API Governance
      - name: Treblle API Analytics
      - name: Treblle API Security
      - name: Treblle API Insights
      - name: Treblle Alfred AI
      - name: Treblle Aspen API Testing
  - id: treblle-enterprise
    name: Enterprise
    type: enterprise
    description: Custom-negotiated tier for Treblle. Includes dedicated capacity, contractual SLAs, security
      review, data residency options, and named technical account management.
    entries:
      - label: API Requests
        description: Negotiated request volume; -1 indicates uncapped subject to fair use
        name: api_requests
        type: quota
        metric: requests
        limit: -1
        timeFrame: month
        geo: configurable
        domains:
          - https://app.treblle.com/api/v1
        unit: 1
        price: custom
        userMultiplied: false
      - label: Rate Limit
        description: Negotiated burst and steady-state rate
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 1000
        timeFrame: minute
        geo: configurable
        domains:
          - https://app.treblle.com/api/v1
        unit: 1
        price: custom
        userMultiplied: false
    elements:
      - name: Unlimited / Negotiated Volume
      - name: 24/7 Dedicated Support
      - name: Contractual SLA
      - name: Security & Compliance Review
      - name: Dedicated Account Manager
      - name: Custom Data Residency
      - name: Treblle
      - name: Treblle Platform API
      - name: Treblle API Intelligence
      - name: Treblle API Documentation
      - name: Treblle API Governance
      - name: Treblle API Analytics
      - name: Treblle API Security
      - name: Treblle API Insights
      - name: Treblle Alfred AI
      - name: Treblle Aspen API Testing
