specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Treblle
providerId: treblle
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - API Observability
  - API Intelligence
  - Developer Tools
  - Rate Limiting
description: Treblle does not publish a public per-second / per-minute API rate-limit numbers page;
  request volume is governed by plan-level monthly caps (50M/month on Core, custom requests-per-minute
  on Growth, unlimited on Enterprise) and any throttling is applied against those plan limits.
sources:
  - https://www.treblle.com/pricing
notes: Limits below are sourced from the Treblle pricing page. There is no separate rate-limits
  documentation page; per-minute and per-month caps are described as plan-level entitlements.
responseCodes:
  throttled: 429
  quotaExceeded: 429
limits:
  - name: Core Plan Monthly Request Cap
    scope: account
    metric: requests_per_month
    limit: 50000000
    timeFrame: month
    notes: Hard cap on ingested API request events for the Core subscription tier.
  - name: Growth Plan Per-Minute Limit
    scope: account
    metric: requests_per_minute
    limit: custom
    notes: Set per contract during Growth plan onboarding.
  - name: Enterprise Plan Per-Minute Limit
    scope: account
    metric: requests_per_minute
    limit: unlimited
    notes: Enterprise plan markets unlimited requests-per-minute as a contractual entitlement.
policies:
  - name: Plan-Scoped Quotas
    description: Treblle scopes quotas to the subscribing account / workspace; throttling is governed
      by the plan tier rather than a globally published per-second limit.
  - name: Custom Negotiation
    description: Per-minute throughput on Growth and retention horizons on both Growth and Enterprise
      are set during the sales process and recorded against the workspace.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
