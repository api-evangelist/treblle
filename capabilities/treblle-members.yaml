naftiko: 1.0.0-alpha2
info:
  label: Treblle API — Members
  description: 'Treblle API — Members. 2 operations. Lead operation: List Project Members. Self-contained Naftiko capability
    covering one Treblle business surface.'
  tags:
  - Treblle
  - Members
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TREBLLE_API_KEY: TREBLLE_API_KEY
capability:
  consumes:
  - type: http
    namespace: treblle-members
    baseUri: https://app.treblle.com/api/v1
    description: Treblle API — Members business capability. Self-contained, no shared references.
    resources:
    - name: projects-projectId-members
      path: /projects/{projectId}/members
      operations:
      - name: listmembers
        method: GET
        description: List Project Members
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          required: true
      - name: invitemember
        method: POST
        description: Invite Member
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Treblle-Api-Key
      value: '{{env.TREBLLE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: treblle-members-rest
    port: 8080
    description: REST adapter for Treblle API — Members. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/projects/{projectid}/members
      name: projects-projectid-members
      description: REST surface for projects-projectId-members.
      operations:
      - method: GET
        name: listmembers
        description: List Project Members
        call: treblle-members.listmembers
        with:
          projectId: rest.projectId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: invitemember
        description: Invite Member
        call: treblle-members.invitemember
        with:
          projectId: rest.projectId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: treblle-members-mcp
    port: 9090
    transport: http
    description: MCP adapter for Treblle API — Members. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-project-members
      description: List Project Members
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: treblle-members.listmembers
      with:
        projectId: tools.projectId
      outputParameters:
      - type: object
        mapping: $.
    - name: invite-member
      description: Invite Member
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: treblle-members.invitemember
      with:
        projectId: tools.projectId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
