naftiko: "1.0.0-alpha1"

info:
  label: "Treblle API"
  description: >-
    The Treblle API Intelligence Platform API providing access to project
    management, API request logs, analytics, governance checks, endpoint
    discovery, and team member management.
  tags:
    - Analytics
    - API Intelligence
    - Governance
    - Monitoring
    - Observability
    - Platform
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TREBLLE_API_KEY: TREBLLE_API_KEY

capability:
  consumes:
    - type: http
      namespace: treblle
      baseUri: https://app.treblle.com/api/v1
      description: "Treblle platform API for API intelligence, monitoring, and governance."
      authentication:
        type: apikey
        key: Treblle-Api-Key
        value: "{{TREBLLE_API_KEY}}"
        placement: header
      resources:
        - name: projects
          path: /projects
          description: "Manage Treblle API monitoring projects"
          operations:
            - name: list-projects
              method: GET
              description: "Returns all API monitoring projects in the workspace"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-project
              method: POST
              description: "Create a new API monitoring project"
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
                  environment: "{{tools.environment}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-project
              method: GET
              description: "Get details of a specific project"
              inputParameters:
                - name: projectId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-project
              method: DELETE
              description: "Delete a project and all associated data"
              inputParameters:
                - name: projectId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: requests
          path: /projects/{projectId}/requests
          description: "Access API request logs"
          operations:
            - name: list-requests
              method: GET
              description: "Get paginated API request logs for a project"
              inputParameters:
                - name: projectId
                  in: path
                  type: string
                  required: true
                - name: page
                  in: query
                  type: integer
                  required: false
                - name: per_page
                  in: query
                  type: integer
                  required: false
                - name: status_code
                  in: query
                  type: integer
                  required: false
                - name: search
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-request
              method: GET
              description: "Get full details of a specific API request"
              inputParameters:
                - name: projectId
                  in: path
                  type: string
                  required: true
                - name: requestId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: analytics
          path: /projects/{projectId}/analytics
          description: "Access API performance analytics"
          operations:
            - name: get-analytics
              method: GET
              description: "Get aggregated analytics including request counts, error rates, and response times"
              inputParameters:
                - name: projectId
                  in: path
                  type: string
                  required: true
                - name: start_date
                  in: query
                  type: string
                  required: false
                - name: end_date
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: endpoints
          path: /projects/{projectId}/endpoints
          description: "Browse auto-discovered API endpoints"
          operations:
            - name: list-endpoints
              method: GET
              description: "Get auto-discovered endpoints from live traffic"
              inputParameters:
                - name: projectId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: governance
          path: /projects/{projectId}/governance
          description: "Run API governance checks"
          operations:
            - name: run-governance-check
              method: POST
              description: "Run 30+ automated governance tests against an OpenAPI specification"
              inputParameters:
                - name: projectId
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data:
                  openapi_spec: "{{tools.openapi_spec}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: treblle-rest
      resources:
        - path: /v1/projects
          name: projects
          operations:
            - method: GET
              name: list-projects
              description: "List all API monitoring projects"
              call: "treblle.list-projects"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/analytics/{projectId}
          name: analytics
          operations:
            - method: GET
              name: get-analytics
              description: "Get project analytics"
              call: "treblle.get-analytics"
              with:
                projectId: "rest.projectId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: treblle-mcp
      transport: http
      tools:
        - name: list-projects
          description: "List all Treblle API monitoring projects"
          hints:
            readOnly: true
            openWorld: false
          call: "treblle.list-projects"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-project-analytics
          description: "Get analytics for a Treblle project including request counts and error rates"
          hints:
            readOnly: true
            openWorld: false
          call: "treblle.get-analytics"
          with:
            projectId: "tools.projectId"
          outputParameters:
            - type: object
              mapping: "$."
