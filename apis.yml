    description: >-
      Alfred is Treblle's AI-powered integration assistant for developer portals,
      enabling automated code generation across multiple programming languages,
      endpoint discovery, and intelligent API documentation support with natural
      language queries, delivering 10x faster API integrations and reducing
      support requests by 15x.
  - aid: treblle:aspen
    name: Treblle Aspen API Testing
    tags:
      - Testing
      - macOS
      - Developer Tools
    humanURL: https://treblle.com/product/aspen
    properties:
      - url: https://treblle.com/product/aspen
        type: ProductPage
    description: >-
      Aspen is Treblle's intelligent API testing application for macOS featuring
      AI-powered capabilities through Alfred AI, the ability to organize API
      requests through Collections, automatic code generation, and team sharing.
      It operates entirely locally with privacy by default and no data saved to
      external servers.
