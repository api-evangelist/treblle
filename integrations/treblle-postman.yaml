naftiko: 1.0.0-alpha2
info:
  label: Sync Treblle-inferred APIs into a Postman collection
  description: Materialize Treblle's live-traffic-derived API definitions as a Postman Collection so developers always have an up-to-date set of requests for the production surface.
  tags:
  - Treblle
  - Integration
  - Dev workflow
  - postman
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    TREBLLE_API_KEY: TREBLLE_API_KEY
    POSTMAN_API_KEY: POSTMAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: treblle
    baseUri: https://api.treblle.com
    description: Treblle API operations consumed by this integration.
    resources:
    - name: projects-projectid-endpoints
      path: /projects/{projectId}/endpoints
      operations:
      - name: listendpoints
        method: GET
        description: List Treblle-inferred endpoints for collection generation.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          description: Path parameter projectId.
          required: true
    - name: projects-projectid-requests
      path: /projects/{projectId}/requests
      operations:
      - name: listrequests
        method: GET
        description: Pull representative Treblle requests to seed collection examples.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          description: Path parameter projectId.
          required: true
  - type: http
    namespace: postman
    baseUri: https://api.getpostman.com
    description: Postman API operations consumed by this integration.
    resources:
    - name: collections-collection-uid
      path: /collections/{collection_uid}
      operations:
      - name: updatecollection
        method: PUT
        description: 'Postman API: updateCollection'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: collection_uid
          in: path
          type: string
          description: Path parameter collection_uid.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: treblle-postman-mcp
    description: MCP adapter for the treblle-postman integration.
    tools:
    - name: treblle_postman
      description: Execute the treblle postman integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: treblle-postman-rest
    port: 8080
    description: REST adapter for the treblle-postman integration.
    resources:
    - path: /treblle-postman
      name: treblle-postman
      description: REST surface for the treblle-postman integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the treblle-postman integration.
        call: treblle_postman
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
